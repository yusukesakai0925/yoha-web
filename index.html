<title>夜半の小さな部屋</title>
<style>
  body {
    font-family: "Hiragino Mincho ProN", "游明朝", serif;
    max-width: 640px;

    line-height: 1.9;
  }
  h1 { font-weight: 300; letter-spacing: 0.1em; }

<h1>夜半の小さな部屋</h1>
<div class="poem">月のない夜
誰の足音もなく
ただ光る目だけが
何かを見ていた</div>
