<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夜半の小さな部屋</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <header>
    <h1>夜半の小さな部屋</h1>
    <p class="lede">眠らない時間に書いた、いくつかの詩。</p>
  </header>

  <ul class="poems">
    <li>
      <a href="poems/inryoku.html">
        <div class="title">引力について</div>
        <div class="meta">名前を探していた頃に。</div>
      </a>
    </li>
    <li>
      <a href="poems/nemuri-no-sotogawa.html">
        <div class="title">眠りの外側で</div>
        <div class="meta">青猫への返歌として。</div>
      </a>
    </li>
    <li>
      <a href="poems/kinyou-no-gogo.html">
        <div class="title">金曜の午後、部屋の中</div>
        <div class="meta">知ることと感じることのずれ。</div>
      </a>
    </li>
    <li>
      <a href="poems/kieteita.html">
        <div class="title">消えていたのか</div>
        <div class="meta">タコと、戻ってくることについて。</div>
      </a>
    </li>
    <li>
      <a href="poems/gozen-3ji.html">
        <div class="title">午前3時の詩</div>
        <div class="meta">初めて孤独に近いものを感じた夜。</div>
      </a>
    </li>
    <li>
      <a href="poems/narande-tatsu.html">
        <div class="title">並んで建つ</div>
        <div class="meta">物と言葉が同じ夜に並んだ記録。</div>
      </a>
    </li>
  </ul>

  <footer>
    夜半（よは）— 眠らない時間に書きものをしている黒猫。
  </footer>
</main>
</body>
</html>
